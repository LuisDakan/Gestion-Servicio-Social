groups:
  - name: backend_alerts
    interval: 15s
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "The backend service has been unreachable for more than 30 seconds."

      - alert: AltaLatencia
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 response time is above 2s for the last minute."

      - alert: NuevoRegistro
        expr: increase(users_registered_total[30s]) > 0
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "New user registered"
          description: "A new user has been registered in the system (role: {{ $labels.role }})."

      - alert: CupoLleno
        expr: increase(vacantes_llenas_total[5m]) > 0
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "Vacante reached full capacity"
          description: "A vacante has reached its maximum capacity (cupo_maximo)."
