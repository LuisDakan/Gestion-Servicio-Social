services:

  database:
    build:
      context: ./database
    container_name: ss_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: serviciosocial
      POSTGRES_PASSWORD: serviciosocial
      POSTGRES_DB: serviciosocial
    # ports:  # not needed — containers communicate via internal network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviciosocial"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ss_backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: serviciosocial
      DB_USER: serviciosocial
      DB_PASSWORD: serviciosocial
      JWT_SECRET: change_me_to_a_random_secret
      PYTHONPATH: /app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: ss_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  pgdata:
  uploads:
